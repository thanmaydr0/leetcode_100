services:
  - type: web
    name: algoforge-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    routes:
      # React Router (Client-Side Routing) Catch-All
      - type: rewrite
        source: /*
        destination: /index.html
